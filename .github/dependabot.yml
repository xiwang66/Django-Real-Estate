# managed-by: codex-github-maintenance
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      dependency-updates:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "github-actions"
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      dependency-updates:
        patterns:
          - "*"
    labels:
      - "dependencies"
